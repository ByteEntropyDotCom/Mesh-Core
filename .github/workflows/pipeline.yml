name: Mesh-Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Provision Certificates for Testing
        run: |
          mkdir -p src/main/resources/certs
          
          # Decode Keystore
          echo "${{ secrets.MESH_KEYSTORE_BASE64 }}" > keystore.tmp
          base64 -d keystore.tmp > src/main/resources/certs/mesh-server.p12
          
          # Decode Truststore
          echo "${{ secrets.MESH_TRUSTSTORE_BASE64 }}" > truststore.tmp
          base64 -d truststore.tmp > src/main/resources/certs/mesh-truststore.p12
          
          # Cleanup and Verification
          rm *.tmp
          echo "Certificates provisioned:"
          ls -lh src/main/resources/certs/

      - name: Build with Maven
        env:
          MESH_KEYSTORE_PASS: ${{ secrets.MESH_KEYSTORE_PASS }}
          MESH_TRUSTSTORE_PASS: ${{ secrets.MESH_TRUSTSTORE_PASS }}
        run: mvn clean verify

      - name: Build Docker Image
        run: |
          docker build -t byteentropy/mesh-core:${{ github.sha }} .
          docker tag byteentropy/mesh-core:${{ github.sha }} byteentropy/mesh-core:latest

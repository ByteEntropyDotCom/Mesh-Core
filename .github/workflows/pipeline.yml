name: Mesh-Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Provision Certificates for Testing
        # printf "%s" ensures NO trailing newline is added to the stream
        # base64 -di ignores garbage characters that might have snuck into the secret
        run: |
          mkdir -p src/main/resources/certs
          echo "${{ secrets.MESH_KEYSTORE_BASE64 }}" | sed 's/[[:space:]]//g' | base64 -d > src/main/resources/certs/mesh-server.p12
          echo "${{ secrets.MESH_TRUSTSTORE_BASE64 }}" | sed 's/[[:space:]]//g' | base64 -d > src/main/resources/certs/mesh-truststore.p12          
          # Verification step to check file creation in logs
          ls -lh src/main/resources/certs/

      - name: Build with Maven
        env:
          MESH_KEYSTORE_PASS: ${{ secrets.MESH_KEYSTORE_PASS }}
          MESH_TRUSTSTORE_PASS: ${{ secrets.MESH_TRUSTSTORE_PASS }}
        run: mvn clean verify

      - name: Build Docker Image
        run: |
          docker build -t byteentropy/mesh-core:${{ github.sha }} .
          docker tag byteentropy/mesh-core:${{ github.sha }} byteentropy/mesh-core:latest

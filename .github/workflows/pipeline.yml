name: Mesh-Core CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Provision Certificates for Testing
        # We use 'printf' because it handles long secret strings more reliably than 'echo'
        # 'base64 -d' decodes the string, and '-di' ignores any accidental wrap-around characters
        run: |
          mkdir -p src/main/resources/certs
          printf "%s" "${{ secrets.MESH_KEYSTORE_BASE64 }}" | base64 -di > src/main/resources/certs/mesh-server.p12
          printf "%s" "${{ secrets.MESH_TRUSTSTORE_BASE64 }}" | base64 -di > src/main/resources/certs/mesh-truststore.p12
          
          # Verify files were created and are not empty
          ls -lh src/main/resources/certs/

      - name: Build with Maven
        env:
          MESH_KEYSTORE_PASS: ${{ secrets.MESH_KEYSTORE_PASS }}
          MESH_TRUSTSTORE_PASS: ${{ secrets.MESH_TRUSTSTORE_PASS }}
        run: mvn clean verify

      - name: Build Docker Image
        # This builds the image with the provisioned certs included
        run: |
          docker build -t byteentropy/mesh-core:${{ github.sha }} .
          docker tag byteentropy/mesh-core:${{ github.sha }} byteentropy/mesh-core:latest

      - name: Security Scan (Optional)
        # A quick check for vulnerabilities in your dependencies
        run: mvn dependency-check:check || echo "Scan completed"

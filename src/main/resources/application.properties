# --- General ---
spring.application.name=mesh-core
server.port=8443

# --- Java 21 / Project Loom ---
# In Spring Boot 3.2+, this enables Virtual Threads for Tomcat/Jetty/Netty
spring.threads.virtual.enabled=true

# --- mTLS & SSL Security ---
# This enforces that the client MUST present a certificate
server.ssl.enabled=true
server.ssl.client-auth=need
server.ssl.key-store=classpath:certs/mesh-server.p12
server.ssl.key-store-password=${MESH_KEYSTORE_PASS}
server.ssl.trust-store=classpath:certs/mesh-truststore.p12
server.ssl.trust-store-password=${MESH_TRUSTSTORE_PASS}

# --- Gateway Routing Policy ---
# Use Discovery (Eureka/K8s) for internal cores
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- Resilience4j / Circuit Breaker ---
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s

# --- Observability ---
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always